modalities:
  - text

features:
  - thinking
  - tool_use
  - streaming

context_length: 128000

thinking:
  native: true
  required: true
  tokens:
    start: "<think>"
    end: "</think>"

tool_calling:
  native: true
  formats:
    - name: pythonic
      tokens:
        section_start: "<|tool_call_start|>["
        section_end: "]<|tool_call_end|>"
  result_tokens:
    start: "<tool_response>\n"
    end: "\n</tool_response>"

tokens:
  bos_token_id: 124894
  pad_token_id: 124893
  eos_token_ids:
    - 124900
