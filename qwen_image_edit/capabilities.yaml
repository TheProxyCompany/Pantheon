modalities:
  - text
  - image

features:
  - image_edit

context_length: 1024

image_edit:
  native: true
  tasks:
    - image_to_image
  inputs:
    - text
    - image
  output:
    type: image
    mime_type: image/png
  resolution:
    min: 256
    max: 2048
    multiple_of: 32

image:
  native: true
  input:
    mime_type: image/png
  output:
    mime_type: image/png
