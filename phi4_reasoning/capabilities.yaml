modalities:
  - text

features:
  - thinking
  - tool_use
  - streaming

context_length: 32768

thinking:
  native: true
  default: false
  tokens:
    start: "<think>"
    end: "</think>"

tool_calling:
  native: true
  formats:
    - name: json
      tokens:
        start: "<tool_call>"
        end: "</tool_call>"
  result_tokens:
    start: "<tool_response>\n"
    end: "\n</tool_response>"
